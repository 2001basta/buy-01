<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="field">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="Your name" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Min. 8 characters" />
      </div>
      <div class="field">
        <label>Account type</label>
        <select formControlName="role">
          <option value="CLIENT">Client — browse & buy</option>
          <option value="SELLER">Seller — list products</option>
        </select>
      </div>
      <p class="error" *ngIf="error">{{ error }}</p>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Creating account...' : 'Sign Up' }}
      </button>
    </form>
    <p class="link">Already have an account? <a routerLink="/auth/login">Login</a></p>
  </div>
</div>
