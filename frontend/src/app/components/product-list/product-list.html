<div class="page">
  <div class="header">
    <h1>Marketplace</h1>
    <div class="actions">
      <a *ngIf="auth.isSeller()" routerLink="/seller/products/create" class="btn-primary">
        + New Product
      </a>
      <a *ngIf="auth.isSeller()" routerLink="/seller/dashboard" class="btn-secondary">
        My Products
      </a>
      <button *ngIf="auth.isLoggedIn()" (click)="auth.logout()" class="btn-logout">
        Logout
      </button>
    </div>
  </div>

  <p *ngIf="loading" class="state">Loading...</p>
  <p *ngIf="error" class="state error">{{ error }}</p>

  <div class="grid" *ngIf="!loading && !error">
    <a *ngFor="let p of products" [routerLink]="['/products', p.id]" class="card">
      <div class="card-image">
        <img *ngIf="p.imageIds.length" [src]="mediaService.getUrl(p.imageIds[0])" [alt]="p.name" />
        <div *ngIf="!p.imageIds.length" class="placeholder">No image</div>
      </div>
      <div class="card-body">
        <h3>{{ p.name }}</h3>
        <p class="desc">{{ p.description }}</p>
        <p class="price">${{ p.price | number:'1.2-2' }}</p>
      </div>
    </a>
    <p *ngIf="products.length === 0" class="state">No products yet.</p>
  </div>
</div>
