<div class="page">
  <div class="header">
    <h1>My Products</h1>
    <a routerLink="/seller/products/create" class="btn-primary">+ New Product</a>
  </div>

  <p *ngIf="loading" class="state">Loading...</p>
  <p *ngIf="error" class="state error">{{ error }}</p>

  <table *ngIf="!loading && products.length">
    <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Price</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products">
        <td>
          <img *ngIf="p.imageIds.length" [src]="mediaService.getUrl(p.imageIds[0])" [alt]="p.name" class="thumb" />
          <span *ngIf="!p.imageIds.length" class="no-img">—</span>
        </td>
        <td>{{ p.name }}</td>
        <td>${{ p.price | number:'1.2-2' }}</td>
        <td class="row-actions">
          <a [routerLink]="['/seller/products/edit', p.id]" class="btn-edit">Edit</a>
          <button (click)="delete(p.id)" class="btn-delete">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && !products.length" class="state">
    No products yet. <a routerLink="/seller/products/create">Create one!</a>
  </p>
</div>
