services:

  # ── Database ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Message Broker (KRaft — no Zookeeper) ─────────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --list --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Distributed Tracing ───────────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"

  # ── Config Server (starts before all business services) ───────────────────
  config-server:
    build: ./ConfigService
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Discovery / Eureka Server ─────────────────────────────────────────────
  discovery-service:
    build: ./DiscoveryService
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s
    depends_on:
      config-server:
        condition: service_healthy

  # ── Business Services ──────────────────────────────────────────────────────
  user-service:
    build: ./UserService
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/userdb
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyForTheMarketplace01}
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mongodb:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    restart: on-failure

  media-service:
    build: ./MediaService
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/mediadb
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyForTheMarketplace01}
      UPLOAD_DIR: /uploads
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    volumes:
      - media-uploads:/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    restart: on-failure

  product-service:
    build: ./ProductService
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/productdb
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyForTheMarketplace01}
      MEDIA_SERVICE_URL: http://media-service:8083
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build: ./ApiGateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyForTheMarketplace01}
      USER_SERVICE_URL: http://user-service:8081
      PRODUCT_SERVICE_URL: http://product-service:8082
      MEDIA_SERVICE_URL: http://media-service:8083
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_SERVER_URL: http://discovery-service:8761/eureka
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      config-server:
        condition: service_healthy
      discovery-service:
        condition: service_healthy
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      media-service:
        condition: service_started
    restart: on-failure

volumes:
  mongo-data:
  media-uploads:
