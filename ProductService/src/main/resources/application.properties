spring.application.name=ProductService
server.port=8082

# Config Server
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}

# Eureka (fallback)
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

spring.data.mongodb.uri=mongodb://localhost:27017/productdb

media.service.url=${MEDIA_SERVICE_URL:http://localhost:8083}

# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Resilience4j — circuit breaker for MediaService calls
resilience4j.circuitbreaker.instances.mediaService.register-health-indicator=true
resilience4j.circuitbreaker.instances.mediaService.sliding-window-size=10
resilience4j.circuitbreaker.instances.mediaService.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.mediaService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.mediaService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.mediaService.failure-rate-threshold=50

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true

# Distributed Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=${MANAGEMENT_ZIPKIN_TRACING_ENDPOINT:http://localhost:9411/api/v2/spans}
