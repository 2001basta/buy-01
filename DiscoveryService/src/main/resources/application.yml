server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  client:
    register-with-eureka: false   # this server doesn't register itself
    fetch-registry: false
    service-url:
      defaultZone: http://localhost:8761/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0   # start immediately without waiting for peers

management:
  endpoints:
    web:
      exposure:
        include: health,info
